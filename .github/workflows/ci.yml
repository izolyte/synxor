name: CI

on:
  pull_request:
  push:
    branches: [main]
  # Lets the opt-in e2e job be triggered by hand from the Actions tab.
  workflow_dispatch:

# A newer push to the same branch cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api — lint · typecheck · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # No job pushes, so don't leave the token in .git/config where a
          # dependency lifecycle script during install could read it.
          persist-credentials: false
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Prisma Client is generated, not committed — every job that compiles the
      # api needs it first.
      - run: pnpm --filter api exec prisma generate
      - run: pnpm --filter api lint
      - run: pnpm --filter api exec tsc --noEmit
      - run: pnpm --filter api build
      - run: pnpm --filter api test

  web:
    name: web — build · lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # No job pushes, so don't leave the token in .git/config where a
          # dependency lifecycle script during install could read it.
          persist-credentials: false
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # web typechecks against the api's shared contract, which pulls in Prisma types.
      - run: pnpm --filter api exec prisma generate
      # `vite build` also writes routeTree.gen.ts, which typecheck and tests import,
      # so it has to run before them. VITE_API_URL is inlined at build time; the
      # value is irrelevant here since CI never serves the bundle.
      - run: pnpm --filter web build
        env:
          VITE_API_URL: http://localhost:3000
      - run: pnpm --filter web lint
      - run: pnpm --filter web exec tsc --noEmit
      - run: pnpm --filter web test

  commitlint:
    name: commitlint — Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  prod-compose:
    name: prod compose — validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      # Parse + interpolate the production topology so structural / interpolation
      # regressions surface without pulling images or standing the stack up. The
      # .env sits next to the compose file (as it does at $DEPLOY_PATH on the host),
      # so both `env_file` and ${VAR} interpolation resolve.
      - run: cp .env.example deploy/.env
      - run: docker compose -f deploy/docker-compose.prod.yml config --quiet

  # Playwright against the full Docker Compose stack (web + api + Postgres + MinIO
  # + Redis). Heavy, so it's opt-in for now: pushes to main, manual dispatch, or a
  # PR labelled `e2e`. The full-transfer journey ships pending (skipped) until #20
  # wires the live Transfer Log — this job runs the render-level scenarios against
  # the real SSR build meanwhile. Once #20 lands, set E2E_STACK=1 below to turn the
  # happy path into a live gate, then promote the trigger to all PRs.
  e2e:
    name: e2e — Playwright against the Compose stack
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'e2e')
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web exec playwright install --with-deps chromium
      # Compose reads its config from .env; the checked-in example is CI-safe.
      - run: cp .env.example .env
      # nginx terminates TLS, so it needs a cert — generate the dev self-signed pair.
      - run: sh nginx/certs/generate-dev-cert.sh
      # Build the images and bring the whole nginx-fronted stack up healthy.
      - run: docker compose up -d --build --wait
      # nginx has no healthcheck of its own, so confirm the ingress actually serves
      # before Playwright's first navigation (self-signed cert → -k).
      - name: Wait for the nginx ingress
        run: |
          for _ in $(seq 1 60); do
            curl -fsk -o /dev/null https://localhost/healthz && exit 0
            sleep 2
          done
          echo "nginx did not serve https://localhost within 120s" >&2
          docker compose logs --no-color >&2 || true
          exit 1
      - name: Run E2E scenarios
        env:
          # Drive the app through the nginx ingress over its self-signed TLS —
          # the same path production serves.
          E2E_BASE_URL: https://localhost
          # Gate the full transfer flow (create → upload → join → download →
          # delivery) against the live stack, not just the render scenarios.
          E2E_STACK: "1"
        run: pnpm --filter web test:e2e
      # TEMP (#83 verify): dump the aria snapshot of the failing page so we can see
      # what the receiver actually rendered.
      - name: Show Playwright error context
        if: failure()
        run: |
          for f in apps/web/test-results/*/error-context.md; do
            echo "===== $f ====="; cat "$f" 2>/dev/null || true
          done
      - name: Dump stack logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Tear down
        if: always()
        run: docker compose down -v
