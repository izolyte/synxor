# Production topology shipped to the VPS by the CD workflow (.github/workflows/cd.yml).
#
# Unlike the root docker-compose.yml (which BUILDS api/web locally for dev), this
# file PULLS pre-built images from GHCR — the CD build-and-push job publishes them
# on every merge to main. The host keeps a `.env` next to this file (secrets +
# POSTGRES_*/MINIO_* creds); the deploy job overrides SYNXOR_IMAGE_TAG to pin the
# stack to the just-built commit (defaults to `latest` for manual `docker compose`).
#
# Operator: place this at $DEPLOY_PATH on the VPS (the workflow scp's it there) and
# keep a populated .env alongside it. See the PR body for the full secret list.
services:
  nginx:
    image: nginx:1.27-alpine
    # Sole ingress: terminates TLS, redirects, rate-limits, caps body size, and
    # routes to api/web. CD ships nginx/templates next to this file; the operator
    # drops real certs into nginx/certs and points TLS_CERT_PATH/TLS_KEY_PATH at
    # them (see README → Deployment).
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    environment:
      MAX_FILE_SIZE_BYTES: ${MAX_FILE_SIZE_BYTES:-5368709120}
      TLS_CERT_PATH: ${TLS_CERT_PATH:-/etc/nginx/certs/dev.crt}
      TLS_KEY_PATH: ${TLS_KEY_PATH:-/etc/nginx/certs/dev.key}
      # Canonical public origin. MUST equal the CI `VITE_API_URL` repo variable the
      # web bundle is built with — otherwise the HTTP→HTTPS redirect points somewhere
      # the browser can't reach. Read from the host .env at deploy time.
      PUBLIC_ORIGIN: ${VITE_API_URL:-https://localhost}
      NGINX_ENVSUBST_FILTER: "^(MAX_FILE_SIZE_BYTES|TLS_CERT_PATH|TLS_KEY_PATH|PUBLIC_ORIGIN)$$"
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - synxor

  api:
    image: ghcr.io/izolyte/synxor-api:${SYNXOR_IMAGE_TAG:-latest}
    # Internal only — nginx is the sole ingress; no host port published.
    expose:
      - "3000"
    env_file: .env
    environment:
      NODE_ENV: production
      # Pin the in-container port: the app reads API_PORT first, so this overrides
      # any API_PORT in .env and keeps the bind, healthcheck, and nginx upstream
      # (all :3000) in lockstep. API_PORT no longer maps a host port here.
      API_PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # web gates on api being healthy, and the deploy job waits on it too. The
      # image is a bare Node runtime with no curl, so probe /health via Node's
      # built-in fetch.
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - synxor

  web:
    image: ghcr.io/izolyte/synxor-web:${SYNXOR_IMAGE_TAG:-latest}
    # Internal only — reached through nginx, not published to the host.
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      api:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - synxor

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - synxor

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      # Console bound to loopback only — the admin UI never faces the internet;
      # reach it over an SSH tunnel. The S3 API (:9000) stays internal to the
      # network and isn't published at all.
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - synxor

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - synxor

volumes:
  postgres_data:
  minio_data:
  redis_data:

networks:
  synxor:
    driver: bridge
