services:
  nginx:
    image: nginx:1.27-alpine
    # Sole ingress: terminates TLS, rate-limits uploads, caps body size, and
    # routes one origin to the api and web services (see nginx/README.md).
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    environment:
      # Substituted into templates/*.template at startup by the image's envsubst
      # step. FILTER limits it to these names so nginx's own $variables survive.
      MAX_FILE_SIZE_BYTES: ${MAX_FILE_SIZE_BYTES:-5368709120}
      TLS_CERT_PATH: ${TLS_CERT_PATH:-/etc/nginx/certs/dev.crt}
      TLS_KEY_PATH: ${TLS_KEY_PATH:-/etc/nginx/certs/dev.key}
      # The one canonical public origin — same value the web bundle is built with
      # (VITE_API_URL above), so the HTTP→HTTPS redirect targets the real host and
      # port instead of reflecting an attacker-controlled Host header.
      PUBLIC_ORIGIN: ${VITE_API_URL:-https://localhost}
      NGINX_ENVSUBST_FILTER: "^(MAX_FILE_SIZE_BYTES|TLS_CERT_PATH|TLS_KEY_PATH|PUBLIC_ORIGIN)$$"
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - synxor

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    # No host ports — the nginx proxy is the only ingress; api stays internal
    # to the synxor network.
    expose:
      - "3000"
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - synxor

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Baked into the client bundle at build time — the browser-facing origin
        # the proxy serves everything on, not the internal docker hostname. With
        # nginx fronting the stack this is the proxy's HTTPS origin; the api and
        # web share it (path-based routing), so tRPC/uploads/sockets all resolve.
        VITE_API_URL: ${VITE_API_URL:-https://localhost}
    # No host ports — reached through the nginx proxy, not directly.
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      api:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - synxor

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - synxor

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - synxor

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - synxor

volumes:
  postgres_data:
  minio_data:
  redis_data:

networks:
  synxor:
    driver: bridge
